<!DOCTYPE html>
<html>
<head>
  <title>AFL Shot Chart</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
    }

    svg {
      background: #e6f7e6;
      border: 2px solid #2c7a2c;
    }

    .Goal { fill: green; }
    .Behind { fill: red; }
    .Miss { fill: gray; }

    .tooltip {
      position: absolute;
      background: white;
      padding: 6px;
      border: 1px solid #ccc;
      font-size: 12px;
      pointer-events: none;
    }
  </style>
</head>

<body>

<h2>AFL Shot Chart</h2>

<svg width="800" height="500"></svg>

<script>
const svg = d3.select("svg");

const xScale = d3.scaleLinear()
  .domain([0, 100])
  .range([50, 750]);

const yScale = d3.scaleLinear()
  .domain([0, 100])
  .range([450, 50]);

// draw field boundary
svg.append("rect")
  .attr("x", 50)
  .attr("y", 50)
  .attr("width", 700)
  .attr("height", 400)
  .attr("fill", "none")
  .attr("stroke", "#2c7a2c");

// tooltip
const tooltip = d3.select("body")
  .append("div")
  .attr("class", "tooltip")
  .style("opacity", 0);

// load data
d3.csv("shots.csv").then(data => {

  svg.selectAll("circle")
    .data(data)
    .enter()
    .append("circle")
      .attr("cx", d => xScale(+d.x))
      .attr("cy", d => yScale(+d.y))
      .attr("r", 6)
      .attr("class", d => d.result)
      .on("mouseover", (event, d) => {
        tooltip
          .style("opacity", 1)
          .html(`${d.player}<br>${d.team}<br>${d.result}`)
          .style("left", event.pageX + "px")
          .style("top", event.pageY - 28 + "px");
      })
      .on("mouseout", () => tooltip.style("opacity", 0));
});
</script>

</body>
</html>
