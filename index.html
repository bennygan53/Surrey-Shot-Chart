<!DOCTYPE html>
<html>
<head>
  <title>Surrey Park AFL Shot Chart</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
    }

    #controls {
      width: 280px;
      padding: 20px;
      background: #f2f2f2;
      border-right: 1px solid #ccc;
      overflow-y: auto;
    }

    label { display:block; margin:6px 0; }

    svg { flex:1; background:white; }

    .shot { stroke:black; stroke-width:1; opacity:0.85; }
    .goal   { fill:green; }
    .behind { fill:orange; }

    #tooltip {
      position:absolute;
      background:rgba(0,0,0,0.8);
      color:white;
      padding:6px 10px;
      border-radius:4px;
      font-size:12px;
      pointer-events:none;
      display:none;
    }
  </style>
</head>
<body>

<div id="controls">
  <h3>Surrey Park Shot Chart</h3>

  <strong>Result</strong>
  <label><input type="checkbox" checked value="Goal" class="filter-result"> Goal</label>
  <label><input type="checkbox" checked value="Behind" class="filter-result"> Behind</label>
  <label><input type="checkbox" checked value="Miss" class="filter-result"> Miss</label>

  <br>
  <strong>Shot Type</strong>
  <label><input type="checkbox" checked value="Set Shot" class="filter-type"> Set Shot</label>
  <label><input type="checkbox" checked value="General Play" class="filter-type"> General Play</label>

  <br>
  <strong>Round</strong>
  <select id="roundFilter"></select>

  <br><br>
  <strong>Quarter</strong>
  <select id="quarterFilter">
    <option value="all">All</option>
    <option>Q1</option>
    <option>Q2</option>
    <option>Q3</option>
    <option>Q4</option>
  </select>

  <br><br>
  <strong>Player</strong>
  <select id="playerFilter"></select>
</div>

<svg width="900" height="550" viewBox="-450 -275 900 550">

  <defs>
    <clipPath id="ovalClip">
      <ellipse cx="0" cy="0" rx="420" ry="240"/>
    </clipPath>
  </defs>

  <g transform="translate(0, -200) rotate(90) scale(1, 1.40)">
    <ellipse cx="0" cy="0" rx="420" ry="240"
             fill="#a9d18e" stroke="#5b7f3b" stroke-width="4"/>

    <path d="M -300 -300 A 300 300 0 0 0 -300 300"
          fill="none" stroke="white" stroke-width="4"
          clip-path="url(#ovalClip)"/>

    <path d="M 350 -300 A 300 300 0 0 0 350 300"
          fill="none" stroke="white" stroke-width="4"
          clip-path="url(#ovalClip)"/>

    <rect x="-120" y="-90" width="240" height="180"
          transform="translate(-120, 0)"
          fill="none" stroke="white" stroke-width="4"/>

    <rect x="-420" y="-18" width="50" height="36"
          fill="none" stroke="white" stroke-width="4"/>

    <rect x="370" y="-18" width="50" height="36"
          fill="none" stroke="white" stroke-width="4"/>
  </g>

  <g id="shotsLayer"></g>
</svg>

<div id="tooltip"></div>

<script>
let shots = [];
const layer = document.getElementById("shotsLayer");
const tooltip = document.getElementById("tooltip");

fetch("surrey shots - Sheet1.csv")
  .then(res => res.text())
  .then(text => {
    const rows = text.trim().split("\n").slice(1);
    shots = rows.map(r => {
      const [x,y,Result,ShotType,Player,Round,Quarter] = r.split(",");
      return {
        x:+x, y:+y,
        result: Result,
        type: ShotType,
        player: Player,
        round: Round,
        quarter: Quarter
      };
    });

    populateFilters();
    drawShots();
  });

function populateFilters() {
  const players = [...new Set(shots.map(s => s.player))];
  const rounds  = [...new Set(shots.map(s => s.round))];

  const playerSel = document.getElementById("playerFilter");
  playerSel.innerHTML = `<option value="all">All</option>`;
  players.forEach(p => playerSel.innerHTML += `<option>${p}</option>`);

  const roundSel = document.getElementById("roundFilter");
  roundSel.innerHTML = `<option value="all">All</option>`;
  rounds.forEach(r => roundSel.innerHTML += `<option>${r}</option>`);
}

function drawShots() {
  layer.innerHTML = "";

  const activeResults = [...document.querySelectorAll(".filter-result:checked")].map(i=>i.value);
  const activeTypes   = [...document.querySelectorAll(".filter-type:checked")].map(i=>i.value);
  const playerVal = playerFilter.value;
  const roundVal  = roundFilter.value;
  const quarterVal= quarterFilter.value;

  shots.forEach(s => {
    if (
      activeResults.includes(s.result) &&
      activeTypes.includes(s.type) &&
      (playerVal==="all" || s.player===playerVal) &&
      (roundVal==="all" || s.round===roundVal) &&
      (quarterVal==="all" || s.quarter===quarterVal)
    ) {

      if (s.result === "Miss") {
        const size=5;
        const l1=document.createElementNS("http://www.w3.org/2000/svg","line");
        const l2=document.createElementNS("http://www.w3.org/2000/svg","line");
        l1.setAttribute("x1",s.x-size); l1.setAttribute("y1",s.y-size);
        l1.setAttribute("x2",s.x+size); l1.setAttribute("y2",s.y+size);
        l2.setAttribute("x1",s.x-size); l2.setAttribute("y1",s.y+size);
        l2.setAttribute("x2",s.x+size); l2.setAttribute("y2",s.y-size);
        [l1,l2].forEach(l=>{
          l.setAttribute("stroke","red");
          l.setAttribute("stroke-width",3);
          addTooltip(l,s);
          layer.appendChild(l);
        });
      } else {
        const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",s.x);
        c.setAttribute("cy",s.y);
        c.setAttribute("r",5);
        c.setAttribute("class","shot "+s.result.toLowerCase());
        addTooltip(c,s);
        layer.appendChild(c);
      }
    }
  });
}

function addTooltip(el,s){
  el.addEventListener("mouseenter",e=>{
    tooltip.style.display="block";
    tooltip.innerHTML=`
      <strong>${s.player}</strong><br>
      Result: ${s.result}<br>
      Type: ${s.type}<br>
      Round: ${s.round}<br>
      Quarter: ${s.quarter}
    `;
  });
  el.addEventListener("mousemove",e=>{
    tooltip.style.left=e.pageX+10+"px";
    tooltip.style.top=e.pageY+10+"px";
  });
  el.addEventListener("mouseleave",()=>tooltip.style.display="none");
}

document.querySelectorAll("input, select").forEach(el=>{
  el.addEventListener("change",drawShots);
});
</script>
</body>
</html>
